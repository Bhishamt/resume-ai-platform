version: '3.8'

# ─── Production Docker Compose ─────────────────────────────────────────────────
# Services: FastAPI · React/Nginx · PostgreSQL · Redis · Celery Worker
#           Celery Beat · Flower (internal) · Nginx reverse proxy
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f backend
#
# Required environment file: .env (copy from .env.example and fill in values)

x-backend-environment: &backend-env
  DATABASE_URL: ${DATABASE_URL}
  SECRET_KEY: ${SECRET_KEY}
  JWT_SECRET: ${JWT_SECRET}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  GROQ_API_KEY: ${GROQ_API_KEY}
  CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost"]}
  UPLOAD_DIR: /app/uploads
  APP_ENV: production
  LOG_FORMAT: json
  STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
  EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
  EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
  SMTP_HOST: ${SMTP_HOST:-}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASSWORD: ${SMTP_PASSWORD:-}
  SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@resumeai.com}
  SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
  FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
  ENABLE_METRICS: "true"
  SENTRY_DSN: ${SENTRY_DSN:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_BUCKET_NAME: ${AWS_BUCKET_NAME:-}
  AWS_REGION: ${AWS_REGION:-us-east-1}

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: resume_ai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-resumeai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-resumeai_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resumeai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: resume_ai_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 320m

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      target: production
    container_name: resume_ai_backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - backend_network
      - frontend_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Celery Worker (default + ai queues) ────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: resume_ai_celery_worker
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app worker
      --loglevel=info
      --queues=default,ai,email,cleanup
      --concurrency=2
      --max-tasks-per-child=50
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Celery Beat (scheduler) ─────────────────────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: resume_ai_celery_beat
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app beat
      --loglevel=info
      --scheduler=celery.beat.PersistentScheduler
      --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 128m

  # ── Celery Flower (monitoring — internal only) ──────────────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.celery
    container_name: resume_ai_flower
    restart: unless-stopped
    command: >
      celery -A app.core.celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flowerpass}
    environment:
      <<: *backend-env
    depends_on:
      - redis
    ports:
      - "127.0.0.1:5555:5555"  # Bind to localhost only — not exposed publicly
    networks:
      - backend_network
    deploy:
      resources:
        limits:
          memory: 128m

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: /api/v1
        VITE_WS_URL: /api/v1/ws
    container_name: resume_ai_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - frontend_network
    deploy:
      resources:
        limits:
          memory: 64m

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: resume_ai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment for TLS:
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 64m

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend_network:
    driver: bridge
    internal: true   # No direct internet access from backend services
  frontend_network:
    driver: bridge   # Nginx bridges internet ↔ backend
